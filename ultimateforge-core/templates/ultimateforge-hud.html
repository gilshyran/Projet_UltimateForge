<div class="uf-hud-container">
    
    <div style="text-align: center; margin-bottom: 10px;">
        <img src="modules/ultimateforge-core/ui/titre_UltimateForge.png" style="max-width: 100%; height: auto; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);">
    </div>

    <div class="uf-section">
        <h4 class="uf-title"><i class="fas fa-hourglass-half"></i> Horloge Narratrice</h4>
        <div class="uf-time-grid">
            <button class="uf-time-btn" data-time="aube" title="Aube"><i class="fas fa-sunrise"></i></button>
            <button class="uf-time-btn" data-time="matin" title="Matin"><i class="fas fa-sun" style="color: #fce588;"></i></button>
            <button class="uf-time-btn" data-time="midi" title="Midi"><i class="fas fa-sun" style="color: #ffb703;"></i></button>
            <button class="uf-time-btn" data-time="apresmidi" title="Après-midi"><i class="fas fa-cloud-sun"></i></button>
            <button class="uf-time-btn" data-time="crepuscule" title="Crépuscule"><i class="fas fa-sunset" style="color: #fb8500;"></i></button>
            <button class="uf-time-btn" data-time="nuit" title="Nuit"><i class="fas fa-moon" style="color: #8ecae6;"></i></button>
        </div>
    </div>

    <div class="uf-section">
        <h4 class="uf-title"><i class="fas fa-cloud-showers-heavy"></i> Climat & Environnement</h4>
        <div class="uf-weather-controls">
            <select id="uf-weather-select">
                <option value="clear">Dégagé / Ensoleillé</option>
                <option value="rain">Pluie / Averse</option>
                <option value="snow">Neige / Froid extrême</option>
                <option value="fog">Brouillard épais</option>
            </select>
            <button id="uf-weather-force" title="Appliquer maintenant"><i class="fas fa-bolt"></i></button>
        </div>
        <div class="uf-checkbox-group">
            <label><input type="checkbox" id="uf-weather-dynamic" checked> Météo Dynamique</label>
        </div>
    </div>

    <div class="uf-section">
        <h4 class="uf-title"><i class="fas fa-cogs"></i> Les Forges</h4>
        <div class="uf-tools-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
            <button id="uf-btn-hexforge" title="HexForge (Éditeur de Terrain)">
                <img src="modules/ultimateforge-core/ui/HexForge.png">
            </button>
            <button id="uf-btn-cityforge" title="CityForge (Générateur Urbain)">
                <img src="modules/ultimateforge-core/ui/CityForge.png">
            </button>
            <button id="uf-btn-journeyforge" title="JourneyForge (Événements de Voyage)">
                <img src="modules/ultimateforge-core/ui/JourneyForge.png">
            </button>
            <button id="uf-btn-realmsforge" title="RealmsForge (Gestion de Région)">
                <img src="modules/ultimateforge-core/ui/RealmsForge.png">
            </button>
            <button id="uf-btn-donjonforge" title="DonjonForge (Générateur de Donjons)">
                <img src="modules/ultimateforge-core/ui/DonjonForge.png">
            </button>
            <button id="uf-btn-guildforge" title="GuildForge (Factions & Sociétés)">
                <img src="modules/ultimateforge-core/ui/GuildForge.png">
            </button>
        </div>
    </div>

</div>
